# README Section Templates
# This file contains centralized templates for common sections across all package READMEs.
# Variables are denoted with {{variable_name}} and will be replaced during sync.

sections:
  nonstop-header:
    content: |
      <p align="center">
        <a href="https://nonstopio.com">
          <img src="https://github.com/nonstopio.png" alt="Nonstop Logo" height="128" />
        </a>
        <h1 align="center">NonStop</h1>
        <p align="center">Digital Product Development Experts for Startups & Enterprises</p>
        <p align="center">
          <a href="https://nonstopio.com/about-us">About</a> |
          <a href="https://nonstopio.com">Website</a>
        </p>
      </p>
    variables: []

  badges:
    content: |
      [![Build Status](https://img.shields.io/pub/v/{{package_name}}.svg)](https://github.com/nonstopio/flutter_forge/tree/main/{{repo_path}})
      [![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](https://opensource.org/licenses/MIT)
    variables: [package_name, repo_path]

  getting-started:
    content: |
      ## Getting Started

      1. Open your project's `pubspec.yaml` file.
      2. Add the `{{package_name}}` package to your dependencies, replacing `[version]` with the latest version:
         ```yaml
         dependencies:
           flutter:
             sdk: flutter
           {{package_name}}: ^[version]
         ```
      3. Run `flutter pub get` to fetch the package.
    variables: [package_name]

  import-package:
    content: |
      ## Import the Package

      ```dart
      import 'package:{{package_name}}/{{import_path}}.dart';
      ```
    variables: [package_name, import_path]

  contributing:
    content: |
      ## Contributing

      We welcome contributions in various forms:

      - Proposing new features or enhancements.
      - Reporting and fixing bugs.
      - Engaging in discussions to help make decisions.
      - Improving documentation, as it is essential.
      - Sending Pull Requests is greatly appreciated!

      A big thank you to all our contributors! 🙌
    variables: []

  connect:
    content: |
      ## 🔗 Connect with NonStop

      <p align="center">
        <a href="https://www.linkedin.com/company/nonstopio"><img src="https://img.shields.io/badge/-LinkedIn-blue?style=flat-square&logo=Linkedin&logoColor=white" alt="LinkedIn"></a>
        <a href="https://x.com/nonstopio"><img src="https://img.shields.io/badge/-X.com-000000?style=flat-square&logo=X&logoColor=white" alt="X.com"></a>
        <a href="https://www.instagram.com/nonstopio/"><img src="https://img.shields.io/badge/-Instagram-E4405F?style=flat-square&logo=Instagram&logoColor=white" alt="Instagram"></a>
        <a href="https://www.youtube.com/@nonstopio"><img src="https://img.shields.io/badge/-YouTube-FF0000?style=flat-square&logo=YouTube&logoColor=white" alt="YouTube"></a>
        <a href="mailto:hello@nonstopio.com"><img src="https://img.shields.io/badge/-Email-D14836?style=flat-square&logo=Gmail&logoColor=white" alt="Email"></a>
      </p>
    variables: []

  star-footer:
    content: |
      <div align="center">

      >  ⭐ Star us on [GitHub](https://github.com/nonstopio/flutter_forge) if this helped you!

      </div>
    variables: []

  license:
    content: |
      ## 📜 License

      This project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details.
    variables: []

  founded-by:
    content: |
      <div align="center">

      > 🎉 [Founded by {{author_name}}](https://github.com/{{github_username}}) 🎉**

      </div>
    variables: [author_name, github_username]
